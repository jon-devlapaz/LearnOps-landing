  - generic [ref=e228]:
    - generic [ref=e229]:
      - paragraph [ref=e230]: FAQ
      - heading "Questions before you ask" [level=2] [ref=e231]
    - generic [ref=e232]:
      - generic [ref=e233]:
        - button "Who is this for?" [ref=e234]:
          - generic [ref=e235]: Who is this for?
          - img [ref=e236]
        - paragraph [ref=e238]: Self-directed learners who study from their own material and want more than summaries, streaks, and quiz cosmetics. If you care whether you actually understand something — not just whether you've seen it — socraTink was built for you.
      - generic [ref=e239]:
        - button "Is this just fancy flashcards?" [ref=e240]:
          - generic [ref=e241]: Is this just fancy flashcards?
          - img [ref=e242]
        - paragraph [ref=e244]: No. Flashcards test recognition of isolated labels. socraTink asks you to reconstruct causal mechanisms from memory — how and why things work, not just what they're called. The AI adapts to where your reasoning actually breaks down, not to a fixed review interval.
      - generic [ref=e245]:
        - button "What subjects does it work for?" [ref=e246]:
          - generic [ref=e247]: What subjects does it work for?
          - img [ref=e248]
        - paragraph [ref=e250]: Any subject with causal structure — sciences, engineering, law, economics, medicine, history. If the material has ideas that depend on other ideas, socraTink can map and drill it.
      - generic [ref=e251]:
        - button "How is this different from RemNote, Anki, or Recall?" [ref=e252]:
          - generic [ref=e253]: How is this different from RemNote, Anki, or Recall?
          - img [ref=e254]
        - paragraph [ref=e256]: "Anki is honest recall without structure. RemNote and Recall have structure but their graphs track notes and activity, not verified understanding. socraTink sits at the intersection: your own material, a real dependency graph, and a map that only advances when you can actually explain the ideas inside it."
      - generic [ref=e257]:
        - button "What about learners with ADHD?" [ref=e258]:
          - generic [ref=e259]: What about learners with ADHD?
          - img [ref=e260]
        - paragraph [ref=e262]: socraTink wasn't designed as an ADHD tool with a general mode — it was designed around clear targets, bounded sessions, and zero-friction re-entry. Features like automatic time-boxing, fatigue guardrails, and context restoration for returning sessions are built into the core loop. If you don't need them, they stay out of your way.
